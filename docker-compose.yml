services:
  avatar-studio:
    build: .
    container_name: ${ENV}-${PROJECT_NAME}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "3000"
    volumes:
      - app-data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${ENV}-${PROJECT_NAME}.rule=Host(`${SITE_BASENAME}`)"
      - "traefik.http.routers.${ENV}-${PROJECT_NAME}.entrypoints=web"
      - "traefik.http.services.${ENV}-${PROJECT_NAME}.loadbalancer.server.port=3000"
    networks:
      - traefik-network

volumes:
  app-data:

networks:
  traefik-network:
    external: true
